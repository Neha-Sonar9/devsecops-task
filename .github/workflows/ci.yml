name: CI Pipeline

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Lint basic
      run: |
        pip install flake8
        flake8 app --max-line-length=120 --ignore=E302,W292

    - name: Run unit tests
      run: |
        pytest

    - name: Run Bandit SAST
      run: |
        pip install bandit
        bandit -r app -ll

    - name: Build Docker image
      run: |
        docker build --no-cache -t devsecops-app .

    - name: Run Trivy scan
      run: |
        docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
        aquasec/trivy:latest image \
        --exit-code 1 \
        --severity HIGH,CRITICAL \
        --ignore-unfixed \
        --vuln-type library \
        devsecops-app

    - name: Login to GHCR
      if: github.ref == 'refs/heads/main'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push image to GHCR
      if: github.ref == 'refs/heads/main'
      run: |
        IMAGE_NAME=ghcr.io/${{ github.repository }}/devsecops-app
        docker build --no-cache -t $IMAGE_NAME:${{ github.sha }} .
        docker push $IMAGE_NAME:${{ github.sha }}

    - name: Generate SBOM
      if: github.ref == 'refs/heads/main'
      uses: anchore/sbom-action@v0
      with:
        image: ghcr.io/${{ github.repository }}/devsecops-app:${{ github.sha }}
        format: spdx-json
        output-file: sbom.spdx.json